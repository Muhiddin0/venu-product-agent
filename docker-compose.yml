version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venu-product-agent
    ports:
      - "56234:56234"
    env_file:
      - .env
    volumes:
      # Mount source code for real-time changes (development)
      - .:/app
      # Mount media directories to persist data
      - ./media:/app/media
      - ./api/mxik-codes.xlsx:/app/api/mxik-codes.xlsx
      - ./temps:/app/temps
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "56234",
        "--reload",
      ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
